<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>土城醫院醫事放射 - 學生實習簽到</title>
<style>
  :root{
    --bg:#F7F4ED;
    --bg-card:#FFFFFF;
    --bg-soft:#EFEBE1;
    --teal-50:#E9F5F0;
    --teal-100:#CFE9DF;
    --teal-400:#5E9C86;
    --teal-600:#3D7864;
    --teal-800:#295247;
    --ink:#3D3935;
    --ink-soft:#756F66;
    --ink-faint:#A6A096;
    --border:#E3DDD0;
    --amber-50:#FBF1E0;
    --amber-600:#B8842E;
    --red-50:#FBEAEA;
    --red-600:#B23B3B;
    --radius-md:10px;
    --radius-lg:18px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Microsoft JhengHei","PingFang TC","Heiti TC","Noto Sans TC",sans-serif;
    font-size:17px;
    line-height:1.6;
    min-height:100vh;
    -webkit-text-size-adjust:100%;
  }
  .wrap{
    max-width:440px;
    margin:0 auto;
    padding:28px 18px 60px;
  }
  .header{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    margin-bottom:22px;
  }
  .mark{
    width:60px;height:60px;border-radius:50%;
    background:var(--teal-50);
    display:flex;align-items:center;justify-content:center;
    margin-bottom:12px;
  }
  .mark svg{width:30px;height:30px;}
  .hospital{
    font-size:14px;color:var(--ink-soft);margin:0;
  }
  .title{
    font-family:"Microsoft JhengHei","PingFang TC","Heiti TC","Noto Sans TC",sans-serif;
    font-weight:700;
    font-size:23px;
    margin:6px 0 0;
    color:var(--ink);
  }
  .card{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    padding:26px 22px;
    margin-bottom:18px;
  }
  .teacher-banner{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--teal-50);
    border-radius:var(--radius-md);
    padding:14px 16px;
    margin-bottom:22px;
  }
  .teacher-banner svg{width:22px;height:22px;flex-shrink:0;color:var(--teal-800);}
  .teacher-banner .label{font-size:13px;color:var(--teal-800);margin:0;}
  .teacher-banner .name{font-size:18px;font-weight:700;margin:2px 0 0;color:var(--teal-800);}
  label{
    display:block;
    font-size:15px;
    color:var(--ink-soft);
    margin-bottom:8px;
    font-weight:500;
  }
  select, button{
    font-family:"Microsoft JhengHei","PingFang TC","Heiti TC","Noto Sans TC",sans-serif;
  }
  select{
    width:100%;
    font-size:17px;
    padding:14px 14px;
    border:1px solid var(--border);
    border-radius:var(--radius-md);
    background:var(--bg-card);
    color:var(--ink);
    margin-bottom:20px;
    appearance:none;
    -webkit-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='%23756F66' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>");
    background-repeat:no-repeat;
    background-position:right 14px center;
  }
  select:focus{
    outline:none;
    border-color:var(--teal-400);
    box-shadow:0 0 0 3px var(--teal-100);
  }
  .btn-primary{
    width:100%;
    padding:16px;
    font-size:18px;
    font-weight:700;
    border:none;
    border-radius:var(--radius-md);
    background:var(--teal-600);
    color:#fff;
    cursor:pointer;
  }
  .btn-primary:active{background:var(--teal-800);}
  .btn-primary:disabled{background:var(--ink-faint);cursor:not-allowed;}
  .btn-secondary{
    width:100%;
    padding:14px;
    font-size:15px;
    font-weight:500;
    border:1px solid var(--border);
    border-radius:var(--radius-md);
    background:var(--bg-card);
    color:var(--ink);
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .btn-secondary svg{width:18px;height:18px;}
  .success-icon{
    width:68px;height:68px;border-radius:50%;
    background:var(--teal-50);
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 16px;
  }
  .success-icon svg{width:34px;height:34px;color:var(--teal-800);}
  .success-title{
    text-align:center;
    font-family:"Microsoft JhengHei","PingFang TC","Heiti TC","Noto Sans TC",sans-serif;
    font-weight:700;
    font-size:22px;
    margin:0 0 20px;
  }
  .success-title.checkout{color:var(--ink);}
  .detail-box{
    background:var(--bg-soft);
    border-radius:var(--radius-md);
    padding:18px 18px;
    font-size:17px;
  }
  .detail-row{
    display:flex;justify-content:space-between;
    padding:7px 0;
  }
  .detail-row + .detail-row{border-top:1px solid var(--border);}
  .detail-row .k{color:var(--ink-soft);}
  .detail-row .v{font-weight:700;}
  .notice{
    text-align:center;
    font-size:13px;
    color:var(--ink-faint);
    margin-top:14px;
  }
  .warn-box{
    background:var(--amber-50);
    border-radius:var(--radius-md);
    padding:16px 18px;
    font-size:15px;
    color:var(--ink);
    margin-bottom:18px;
    line-height:1.6;
  }
  .error-box{
    background:var(--red-50);
    color:var(--red-600);
    border-radius:var(--radius-md);
    padding:16px 18px;
    font-size:15px;
    margin-bottom:18px;
    line-height:1.6;
  }
  .section-title{
    font-size:15px;
    font-weight:700;
    color:var(--ink-soft);
    margin:30px 0 12px;
  }
  .history-list{
    display:flex;flex-direction:column;gap:8px;
  }
  .history-item{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius-md);
    padding:12px 16px;
    font-size:14px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .history-item .meta{color:var(--ink-soft);}
  .tag{
    font-size:12px;font-weight:700;
    padding:3px 10px;border-radius:999px;
  }
  .tag.checkin{background:var(--teal-50);color:var(--teal-800);}
  .tag.checkout{background:var(--bg-soft);color:var(--ink-soft);}
  .empty-state{
    text-align:center;color:var(--ink-faint);font-size:14px;padding:20px 0;
  }
  .hidden{display:none !important;}
  .loading{
    text-align:center;color:var(--ink-soft);padding:40px 0;font-size:15px;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#3D7864" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2 7 4-14 2 7h6"/></svg>
    </div>
    <p class="hospital">土城醫院醫事放射</p>
    <h1 class="title">學生實習簽到</h1>
  </div>

  <div id="loadingState" class="card">
    <p class="loading">系統載入中,請稍候...</p>
  </div>

  <div id="errorState" class="card hidden">
    <div class="error-box" id="errorMsg"></div>
  </div>

  <div id="mainCard" class="card hidden">

    <div class="teacher-banner">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
      <div>
        <p class="label">目前老師</p>
        <p class="name" id="teacherNameDisplay">—</p>
      </div>
    </div>

    <div id="formArea">
      <label for="studentSelect">請選擇您的姓名</label>
      <select id="studentSelect">
        <option value="">請選擇...</option>
      </select>
      <button class="btn-primary" id="confirmBtn">確認簽到 / 簽退</button>
    </div>

    <div id="successArea" class="hidden">
      <div class="success-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <p class="success-title" id="successTitle">簽到成功</p>
      <div class="detail-box">
        <div class="detail-row"><span class="k">姓名</span><span class="v" id="resName">-</span></div>
        <div class="detail-row"><span class="k">時間</span><span class="v" id="resTime">-</span></div>
        <div class="detail-row"><span class="k">站別</span><span class="v" id="resStation">-</span></div>
        <div class="detail-row"><span class="k">老師</span><span class="v" id="resTeacher">-</span></div>
      </div>
      <p class="notice">此筆紀錄已儲存在本機,請記得每週匯出備份</p>
      <div style="margin-top:18px;">
        <button class="btn-secondary" id="backBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></polyline></svg>
          返回
        </button>
      </div>
    </div>

  </div>

  <div class="section-title">我的紀錄</div>
  <div id="historyList" class="history-list">
    <div class="empty-state">尚無簽到紀錄</div>
  </div>

  <div style="margin-top:20px;">
    <button class="btn-secondary" id="exportBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      匯出我的紀錄
    </button>
  </div>

</div>

<script>
(function(){

  var STORAGE_KEY = 'tucheng-radio-intern-records-v1';
  var dataConfig = null;
  var currentTeacher = null;
  var students = [];

  function qs(name){
    var params = new URLSearchParams(window.location.search);
    return params.get(name);
  }

  function pad(n){ return n < 10 ? '0' + n : '' + n; }

  function formatDate(d){
    return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
  }

  function formatTime(d){
    return pad(d.getHours()) + ':' + pad(d.getMinutes());
  }

  function loadRecords(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch(e){
      return [];
    }
  }

  function saveRecords(records){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  }

  function uuid(){
    return 'r' + Date.now() + '-' + Math.random().toString(36).slice(2,8);
  }

  function findScheduleStation(studentId, dateStr){
    if(!dataConfig || !dataConfig.schedule) return '';
    for(var i=0;i<dataConfig.schedule.length;i++){
      var s = dataConfig.schedule[i];
      if(s.studentId === studentId && dateStr >= s.startDate && dateStr <= s.endDate){
        return s.station;
      }
    }
    return '';
  }

  function renderHistory(){
    var records = loadRecords();
    var listEl = document.getElementById('historyList');
    if(records.length === 0){
      listEl.innerHTML = '<div class="empty-state">尚無簽到紀錄</div>';
      return;
    }
    var sorted = records.slice().sort(function(a,b){ return b.timestamp - a.timestamp; });
    var html = '';
    var shown = sorted.slice(0, 30);
    for(var i=0;i<shown.length;i++){
      var r = shown[i];
      var tagClass = r.type === 'checkin' ? 'checkin' : 'checkout';
      var tagLabel = r.type === 'checkin' ? '簽到' : '簽退';
      html += '<div class="history-item">' +
        '<div><div>' + r.date + ' ' + r.time + '</div>' +
        '<div class="meta">' + r.station + ' · ' + r.teacherName + '</div></div>' +
        '<span class="tag ' + tagClass + '">' + tagLabel + '</span>' +
        '</div>';
    }
    listEl.innerHTML = html;
  }

  function showSuccess(record){
    document.getElementById('formArea').classList.add('hidden');
    document.getElementById('successArea').classList.remove('hidden');
    document.getElementById('successTitle').textContent = record.type === 'checkin' ? '簽到成功' : '簽退成功';
    document.getElementById('resName').textContent = record.studentName;
    document.getElementById('resTime').textContent = record.date + ' ' + record.time;
    document.getElementById('resStation').textContent = record.station || '(未設定排程)';
    document.getElementById('resTeacher').textContent = record.teacherName;
  }

  function handleConfirm(){
    var studentId = document.getElementById('studentSelect').value;
    if(!studentId){
      alert('請先選擇您的姓名');
      return;
    }
    var student = null;
    for(var i=0;i<students.length;i++){
      if(students[i].id === studentId){ student = students[i]; break; }
    }
    if(!student) return;

    var now = new Date();
    var todayStr = formatDate(now);
    var station = findScheduleStation(studentId, todayStr);

    var records = loadRecords();
    var thresholdMin = (dataConfig.settings && dataConfig.settings.duplicateThresholdMinutes) || 2;
    var thresholdMs = thresholdMin * 60 * 1000;

    var todays = [];
    for(var j=0;j<records.length;j++){
      var r = records[j];
      if(r.studentId === studentId && r.teacherId === currentTeacher.id && r.date === todayStr){
        todays.push(r);
      }
    }
    todays.sort(function(a,b){ return b.timestamp - a.timestamp; });
    var last = todays[0];

    var resultRecord;
    if(last && (now.getTime() - last.timestamp) <= thresholdMs){
      last.timestamp = now.getTime();
      last.time = formatTime(now);
      resultRecord = last;
    } else {
      var type = (todays.length % 2 === 0) ? 'checkin' : 'checkout';
      resultRecord = {
        id: uuid(),
        date: todayStr,
        studentId: studentId,
        studentName: student.name,
        teacherId: currentTeacher.id,
        teacherName: currentTeacher.name,
        station: station,
        type: type,
        time: formatTime(now),
        timestamp: now.getTime()
      };
      records.push(resultRecord);
    }

    saveRecords(records);
    showSuccess(resultRecord);
    renderHistory();
  }

  function exportRecords(){
    var records = loadRecords();
    if(records.length === 0){
      alert('目前沒有任何紀錄可以匯出');
      return;
    }
    var payload = {
      exportedAt: new Date().toISOString(),
      records: records
    };
    var blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    var now = new Date();
    var fname = '學生簽到_' + (records[0] ? records[0].studentName : '') + '_' + formatDate(now) + '.json';
    a.href = url;
    a.download = fname;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function showError(msg){
    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('errorState').classList.remove('hidden');
    document.getElementById('errorMsg').textContent = msg;
  }

  function init(){
    var teacherId = qs('teacher');
    if(!teacherId){
      showError('找不到老師資訊,請重新掃描老師的 QR Code。');
      return;
    }

    fetch('./data.json', {cache:'no-store'})
      .then(function(res){
        if(!res.ok) throw new Error('讀取設定檔失敗');
        return res.json();
      })
      .then(function(json){
        dataConfig = json;
        students = json.students || [];

        currentTeacher = null;
        for(var i=0;i<(json.teachers||[]).length;i++){
          if(json.teachers[i].id === teacherId){ currentTeacher = json.teachers[i]; break; }
        }
        if(!currentTeacher){
          showError('找不到對應的老師資料,請確認 QR Code 是否正確,或聯絡管理者更新系統資料。');
          return;
        }

        document.getElementById('teacherNameDisplay').textContent = currentTeacher.name;

        var sel = document.getElementById('studentSelect');
        var opts = '<option value="">請選擇...</option>';
        for(var k=0;k<students.length;k++){
          opts += '<option value="' + students[k].id + '">' + students[k].name + '</option>';
        }
        sel.innerHTML = opts;

        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('mainCard').classList.remove('hidden');

        renderHistory();
      })
      .catch(function(err){
        showError('無法載入系統資料(data.json),請確認網路連線,或聯絡管理者確認檔案是否已上傳。');
      });
  }

  document.getElementById('confirmBtn').addEventListener('click', handleConfirm);
  document.getElementById('exportBtn').addEventListener('click', exportRecords);
  document.getElementById('backBtn').addEventListener('click', function(){
    document.getElementById('successArea').classList.add('hidden');
    document.getElementById('formArea').classList.remove('hidden');
    document.getElementById('studentSelect').value = '';
  });

  init();

})();
</script>
</body>
</html>
